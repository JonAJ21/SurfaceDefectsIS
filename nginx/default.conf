server {
    listen 8080;
    server_name localhost;

    location /stub_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.0.0.0/8;
        deny all;
    }
}

server {
    listen 80;
    server_name localhost;

    # ==================== METRICS ====================
    
    location /metrics {
        proxy_pass http://auth-service:8000/metrics;
        proxy_set_header Host $host;
    }

    # ==================== AUTH SERVICE ====================
    
    location /v1/ {
        proxy_pass http://auth-service:8000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==================== DEFECTS SERVICE ====================
    
    # Все запросы к /v1/defects идут в defects service
    location /v1/defects {
        proxy_pass http://defects-service:8000/v1/defects;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/snap-point {
        proxy_pass http://defects-service:8000/v1/snap-point;
        proxy_set_header Host $host;
    }

    # Users defects endpoint
    location /users/ {
        proxy_pass http://defects-service:8000/users/;
        proxy_set_header Host $host;
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}