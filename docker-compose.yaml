services:
  # Auth 
  auth-postgres:
    container_name: auth-postgres
    image: postgres:17.2
    environment:
      POSTGRES_DB: "${POSTGRES_NAME}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - .auth-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  auth-redis:
    image: redis:alpine3.21
    container_name: auth-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: /bin/sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - .auth-redis:/data
    restart: unless-stopped
    networks:
      - backend

  auth-service:
    container_name: auth-service
    build: 
      context: ./AuthService
      dockerfile: Dockerfile
    command: "uvicorn --factory main:create_app --host=0.0.0.0 --reload --port 8000"
    volumes:
      - ./AuthService/app:/app
    ports:
      - "${AUTH_SERVICE_PORT}:8000"
    env_file:
      - ".env"
    restart: unless-stopped
    depends_on:
      - auth-postgres
      - auth-redis
    networks:
      - backend

  #Defects
  defects-postgres:
    image: postgis/postgis:15-3.4
    container_name: defects-postgres
    environment:
      POSTGRES_DB: "${DEFECTS_POSTGRES_NAME}"
      POSTGRES_USER: "${DEFECTS_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${DEFECTS_POSTGRES_PASSWORD}"
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "${DEFECTS_POSTGRES_PORT}:5432"
    volumes:
      - .defects-postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEFECTS_POSTGRES_USER} - d ${DEFECTS_POSTGRES_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
  
  defects-redis:
    image: redis:alpine3.21
    container_name: defects-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: /bin/sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    ports:
      - "${DEFECTS_REDIS_PORT}:6379"
    volumes:
      - .defects-redis:/data
    restart: unless-stopped
    networks:
      - backend

  defects-minio:
    image: minio/minio:latest
    container_name: defects-minio
    ports:
      - "${DEFECTS_MINIO_API_PORT}:9000"
      - "${DEFECTS_MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: "${DEFECTS_MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${DEFECTS_MINIO_ROOT_PASSWORD}"
    volumes:
      - .defects-minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend

  tilemaker:
    image: ghcr.io/systemed/tilemaker:master
    container_name: tilemaker-generator
    volumes:
      - ./TileMaker:/data    
    environment:
      - TILEMAKER_THREADS=4
    networks:
      - backend
    profiles:
      - generate

  defects-service:
    container_name: defects-service
    build: 
      context: ./DefectService
      dockerfile: Dockerfile
    command: "uvicorn --factory main:create_app --host=0.0.0.0 --reload --port 8000"
    volumes:
      - ./DefectService/app:/app
      - ./TileMaker/osmpbf:/app/osm
    ports:
      - "${DEFECTS_SERVICE_PORT}:8000"
    env_file:
      - ".env"
    restart: unless-stopped
    depends_on:
      - auth-service
      - defects-minio
      # - tilemaker
      - defects-postgres
      - defects-redis
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"      
      - "8080:8080"        
    depends_on:
      - auth-service
      - defects-service
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend
    depends_on:
      - auth-service
      - defects-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "0"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD="${GF_SECURITY_ADMIN_PASSWORD}"
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - .grafana:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus


  
networks:
  backend:
    driver: bridge